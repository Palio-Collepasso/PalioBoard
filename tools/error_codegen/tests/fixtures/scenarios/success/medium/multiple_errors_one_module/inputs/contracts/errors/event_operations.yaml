module: event_operations
errors:
  JOLLY_ALREADY_USED:
    code: JOLLY_ALREADY_USED
    type_slug: jolly-already-used
    http_status: 409
    title: Jolly already used
    translation_key: errors.jollyAlreadyUsed
    context_schema:
      type: object
      additionalProperties: false
      properties:
        team_id: { type: string, format: uuid }
        game_id: { type: string, format: uuid }
        previous_game_id: { type: string, format: uuid }
      required: [team_id, game_id, previous_game_id]
    example_context:
      team_id: "01956c9f-6f7e-7b42-a4b0-2d21d920c001"
      game_id: "01956ca0-0c77-7b98-a328-39c9f8a31002"
      previous_game_id: "01956ca0-53dd-7162-b78a-4bdb9368b003"

  GAME_NOT_IN_PROGRESS:
    code: GAME_NOT_IN_PROGRESS
    type_slug: game-not-in-progress
    http_status: 409
    title: Game not in progress
    translation_key: errors.gameNotInProgress
    context_schema:
      type: object
      additionalProperties: false
      properties:
        game_id: { type: string, format: uuid }
        current_state: { type: string }
      required: [game_id, current_state]
    example_context:
      game_id: "01956ca0-0c77-7b98-a328-39c9f8a31002"
      current_state: "draft"

  INVALID_PLACEMENT:
    code: INVALID_PLACEMENT
    type_slug: invalid-placement
    http_status: 400
    title: Invalid placement
    translation_key: errors.invalidPlacement
    context_schema:
      type: object
      additionalProperties: false
      properties:
        game_id: { type: string, format: uuid }
        team_id: { type: string, format: uuid }
        placement: { type: integer, minimum: 1 }
      required: [game_id, team_id, placement]
    example_context:
      game_id: "01956ca0-0c77-7b98-a328-39c9f8a31002"
      team_id: "01956c9f-6f7e-7b42-a4b0-2d21d920c001"
      placement: 0
