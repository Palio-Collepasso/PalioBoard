openapi: 3.1.0
info:
  title: PalioBoard API
  version: 0.1.0
paths:
  /healthz:
    get:
      tags:
      - meta
      summary: Healthcheck
      description: Return the basic process health payload.
      operationId: healthcheck_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthcheck Healthz Get
  /readyz:
    get:
      tags:
      - meta
      summary: Readiness
      description: Return runtime readiness based on database availability.
      operationId: readiness_readyz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '503':
          description: Api runtime is not ready
  /version:
    get:
      tags:
      - meta
      summary: Version
      description: Return build and environment metadata for the running API.
      operationId: version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Version Version Get
  /api/admin/health:
    get:
      tags:
      - admin
      summary: Admin Health
      description: Return a placeholder health payload for the admin surface.
      operationId: admin_health_api_admin_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Admin Health Api Admin Health Get
  /api/public/health:
    get:
      tags:
      - public
      summary: Public Health
      description: Return a placeholder health payload for the public surface.
      operationId: public_health_api_public_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Public Health Api Public Health Get
  /realtime/health:
    get:
      tags:
      - realtime
      summary: Realtime Health
      description: Return a placeholder health payload for the realtime surface.
      operationId: realtime_health_realtime_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Realtime Health Realtime Health Get
